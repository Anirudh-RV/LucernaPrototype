version: "3.8"

services:
  lucerna-db:
    image: postgres:16
    volumes:
      - lucerna_postgres_data:/var/lib/postgresql/data
    env_file:
      - ../env/env-local.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucernauser -d lucernadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  lucerna-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  lucerna-backend:
    build:
      context: ..
      dockerfile: Dockerfiles/Dockerfile-local
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ..:/code
    ports:
      - "8000:8000"
    env_file:
      - ../env/env-local.env
    depends_on:
      lucerna-db:
        condition: service_healthy
      lucerna-redis:
        condition: service_healthy

volumes:
  lucerna_postgres_data:
